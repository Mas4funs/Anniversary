<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Countdown 27 Juli 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
}

body {
    background: radial-gradient(circle at top, #111, #000);
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: #fff;
}

.container {
    text-align: center;
}

h1 {
    font-size: 3rem;
    margin-bottom: 40px;
    letter-spacing: 2px;
}

.timer {
    display: flex;
    gap: 30px;
    justify-content: center;
}

.box {
    background: rgba(255,255,255,0.05);
    padding: 30px 35px;
    border-radius: 18px;
    min-width: 140px;
    box-shadow: 0 0 35px rgba(0,0,0,0.8);
}

.number {
    font-size: 3.5rem;
    font-weight: bold;
    transition: transform 0.25s ease, opacity 0.25s ease;
}

.number.animate {
    transform: scale(1.25);
    opacity: 0.6;
}

.label {
    margin-top: 10px;
    font-size: 0.9rem;
    letter-spacing: 1px;
    color: #aaa;
}

/* Mobile */
@media (max-width: 768px) {
    h1 { font-size: 2rem; }
    .timer { flex-wrap: wrap; gap: 20px; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Happy Anniversary 1st</h1>
		<h2>16 Desember 2025</h2>
		</br>
    <div class="timer">
        <div class="box">
            <div class="number" id="days">0</div>
            <div class="label">HARI</div>
        </div>
        <div class="box">
            <div class="number" id="hours">00</div>
            <div class="label">JAM</div>
        </div>
        <div class="box">
            <div class="number" id="minutes">00</div>
            <div class="label">MENIT</div>
        </div>
        <div class="box">
            <div class="number" id="seconds">00</div>
            <div class="label">DETIK</div>
        </div>
    </div>
</div>

<script>
/* ==========================
   KIOSK MODE & LOCK HALAMAN
========================== */

// Disable klik kanan
document.addEventListener('contextmenu', e => e.preventDefault());

// Disable shortcut keyboard
document.addEventListener('keydown', e => {
    if (
        e.key === "F11" ||
        e.key === "Escape" ||
        (e.ctrlKey && ["c","v","u","s","p"].includes(e.key.toLowerCase())) ||
        (e.altKey)
    ) {
        e.preventDefault();
    }
});

// Auto fullscreen
function goFullscreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(()=>{});
    }
}
document.addEventListener('click', goFullscreen);
setTimeout(goFullscreen, 1000);

/* ==========================
   SERVER WIB COUNTDOWN
========================== */

const targetDateWIB = new Date("2025-12-16T00:00:00+07:00");
let serverOffset = 0;

// Ambil waktu server WIB
async function syncServerTime() {
    try {
        const res = await fetch("https://worldtimeapi.org/api/timezone/Asia/Jakarta");
        const data = await res.json();
        const serverTime = new Date(data.datetime).getTime();
        const localTime = Date.now();
        serverOffset = serverTime - localTime;
    } catch (e) {
        console.error("Gagal sinkron waktu server WIB");
    }
}

function animate(el, value) {
    if (el.textContent !== value) {
        el.textContent = value;
        el.classList.add("animate");
        setTimeout(() => el.classList.remove("animate"), 250);
    }
}

function updateCountdown() {
    const now = Date.now() + serverOffset;
    const diff = targetDateWIB - now;

    if (diff <= 0) {
        window.location.href = "/anniversary.html";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    animate(daysEl, days);
    animate(hoursEl, String(hours).padStart(2, "0"));
    animate(minutesEl, String(minutes).padStart(2, "0"));
    animate(secondsEl, String(seconds).padStart(2, "0"));
}

const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");

// Init
syncServerTime().then(() => {
    updateCountdown();
    setInterval(updateCountdown, 1000);
});
</script>

</body>
</html>
